<!DOCTYPE html>
<html>
<head>
    <title>Fake Job Detection System</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px;
            width: 600px;
            text-align: center;
            color: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            resize: none;
            font-size: 15px;
            outline: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: #00c851;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #00a844;
        }

        .result {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
        }

        .fake {
            background: rgba(255, 77, 77, 0.3);
        }

        .real {
            background: rgba(76, 175, 80, 0.3);
        }

        .links {
            margin-top: 25px;
        }

        .links a {
            color: white;
            text-decoration: none;
            margin: 0 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🚀 Fake Job Detection System</h1>

    <form action="/predict" method="post">
        <textarea name="job_text" placeholder="Paste job description here..." required></textarea>
        <br>
        <button type="submit">🔍 Check Job</button>
    </form>

    {% if prediction %}
        <div class="result {% if prediction == 'Fake Job' %}fake{% else %}real{% endif %}">
            🔎 Prediction: {{ prediction }} <br>
            📊 Confidence: {{ confidence }}% <br>
            🚨 Risk Level: {{ risk }}
        </div>
    {% endif %}

    <div class="links">
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/login">🔐 Admin Login</a>
    </div>

    <div class="footer">
        AI Powered Fraud Job Detection System
    </div>

</div>

</body>
</html>
