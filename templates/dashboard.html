<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - Fake Job Detection</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        h1 {
            padding-top: 30px;
            margin-bottom: 30px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            width: 220px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.3);
        }

        .card h2 {
            margin: 0;
            font-size: 32px;
        }

        .card p {
            margin-top: 10px;
            font-weight: bold;
        }

        .chart-container {
            width: 350px;
            height: 350px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.3);
        }

        .buttons {
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background: white;
            color: #2a5298;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f1f1f1;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h1>📊 Admin Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h2>{{ total }}</h2>
            <p>Total Predictions</p>
        </div>

        <div class="card">
            <h2>{{ fake }}</h2>
            <p>Fake Jobs</p>
        </div>

        <div class="card">
            <h2>{{ real }}</h2>
            <p>Real Jobs</p>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <div class="buttons">
        <a href="/download-logs" class="btn">⬇ Download Logs</a>
        <a href="/logout" class="btn">🚪 Logout</a>
        <a href="/" class="btn">🏠 Home</a>
    </div>

    <script>
        const ctx = document.getElementById('myChart');

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Fake Jobs', 'Real Jobs'],
                datasets: [{
                    data: [{{ fake }}, {{ real }}],
                    backgroundColor: ['#ff4d4d', '#4CAF50']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });
    </script>

</body>
</html>
